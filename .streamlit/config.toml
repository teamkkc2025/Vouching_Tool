To upload on GitHub: click **"Add file" → "Upload files"** and drag all 3 items.
 
---
 
### **Step 3: Deploy on Streamlit Cloud**
 
1. Go to **share.streamlit.io**

2. Sign in with your **GitHub account**

3. Click **"New app"**

4. Fill in:

   - **Repository:** `your-username/kkc-vouching-tool`

   - **Branch:** `main`

   - **Main file path:** `vouching_tool_kkc.py`

5. Click **"Deploy"**
 
It will take ~2 minutes to build. You'll get a URL like:

`https://kkc-vouching-tool.streamlit.app`
 
---
 
### **Step 4: Fix the Tesseract OCR issue (important)**
 
Tesseract is a system package — it won't install via `requirements.txt`. You need a **`packages.txt`** file:

```

tesseract-ocr

tesseract-ocr-eng
 
